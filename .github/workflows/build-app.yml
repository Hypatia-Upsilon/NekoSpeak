name: Build Custom NekoSpeak

on:
  workflow_dispatch:
    inputs:
      custom_application_id:
        description: '自定义包名 (例如: com.nekospeak.tts.my。留空则使用默认)'
        required: false
        type: string
        default: 'com.nekospeak.tts.alpha'
#  push:
#    branches:[ "main", "master" ]

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 4. Inject Keystore File
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: 5. Dynamic modify build.gradle.kts (The Magic Step)
        run: |
          APP_ID="${{ github.event.inputs.custom_application_id }}"
          if [ -n "$APP_ID" ]; then
            echo "🔥 正在将包名替换为: $APP_ID"
            sed -i "s/applicationId = \"[^\"]*\"/applicationId = \"$APP_ID\"/g" app/build.gradle.kts
          fi
          
          echo "🔥 正在注入安全签名配置..."
          sed -i 's/storePassword = "[^"]*"/storePassword = System.getenv("KEYSTORE_PASSWORD")/g' app/build.gradle.kts
          sed -i 's/keyAlias = "[^"]*"/keyAlias = System.getenv("KEY_ALIAS")/g' app/build.gradle.kts
          sed -i 's/keyPassword = "[^"]*"/keyPassword = System.getenv("KEY_PASSWORD")/g' app/build.gradle.kts

      # ==========================================
      # 新增：步骤 6 - 完整打印修改后的 build.gradle.kts 校验
      # ==========================================
      - name: 6. Verify modified build.gradle.kts
        run: |
          echo "================================================="
          echo "      修改后的 build.gradle.kts 完整内容           "
          echo "================================================="
          cat app/build.gradle.kts
          echo "================================================="
          echo "检查点提示："
          echo "1. 请确认 signingConfigs 块中的密码已被替换为 System.getenv(...)"
          echo "2. 请确认 defaultConfig 块中的 applicationId 是否符合预期"

      - name: 7. Build and Auto-Sign Release APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: 8. Upload Final APKs
        uses: actions/upload-artifact@v4
        with:
          name: NekoSpeak-Signed-APKs
          path: app/build/outputs/apk/release/*.apk

      - name: 9. Security Cleanup (主动清洗签名与敏感信息)
        if: always()
        run: |
          echo "🧹 开始主动清洗构建环境中的敏感数据..."
          
          # 修复点：确保此处的 if 和[ 之间也有空格
          if [ -f "app/release.keystore" ]; then
            shred -u app/release.keystore || rm -f app/release.keystore
            echo "✅ Keystore 物理文件已彻底覆写并销毁。"
          else
            echo "ℹ️ 未发现 Keystore 文件，无需清理。"
          fi
          
          git checkout app/build.gradle.kts 2>/dev/null || true
          echo "✅ 构建脚本已恢复至上游无痕状态。"
