name: Verify Keystore Secrets

on:
  workflow_dispatch:

jobs:
  verify-keys:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Restore Keystore from Base64
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "==== 1. 开始还原签名文件 ===="
          echo "$KEYSTORE_BASE64" | base64 --decode > test.keystore
          
          echo "文件还原成功，体积如下："
          ls -lh test.keystore

      - name: 3. Verify Keystore & Print Signature Info
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "==== 2. 验证 Store Password 和 Alias ===="
          # 使用 keytool 列出详细的证书信息（验证 storepass 和 alias）
          keytool -list -v \
            -keystore test.keystore \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASSWORD"
            
          echo "==== 3. 严格验证 Key Password ===="
          # 生成一个虚拟的证书请求 (CSR)，这是只读操作，但强制要求正确的 keypass 才能执行
          keytool -certreq \
            -alias "$KEY_ALIAS" \
            -keystore test.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -file dummy.csr
            
          echo "✅ 恭喜！所有的密码、别名、以及 Base64 文件全部校验通过！"

      - name: 4. Security Cleanup
        if: always()
        run: |
          echo "🧹 清理测试文件..."
          shred -u test.keystore dummy.csr 2>/dev/null || rm -f test.keystore dummy.csr
          echo "✅ 清理完毕。"
